server:
  port: 8080

spring:
  application:
    name: security-co
  config:
    import: vault://
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${db.username}
    password: ${db.password}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    vault:
      enabled: ${VAULT_ENABLED:true}
      uri: ${VAULT_ADDR:http://vault:8200}
      authentication: APPROLE
      app-role:
        role-id: ${VAULT_ROLE_ID}
        secret-id: ${VAULT_SECRET_ID}
        role: security-co-app
      kv:
        enabled: true
        backend: secret
        default-context: security-co
        version: 2

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  external-endpoint: ${MINIO_EXTERNAL_ENDPOINT:}
  access-key: ${minio.access-key}
  secret-key: ${minio.secret-key}
  bucket-name: ${MINIO_BUCKET}

jwt:
  access-token-expiry: 900000      # 15 minutes
  refresh-token-expiry: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.securityco: INFO
    org.springframework.security: WARN
