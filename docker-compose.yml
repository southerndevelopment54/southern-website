services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - /home/southern-tech-workstation/postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio-server
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /home/southern-tech-workstation/minio-data:/data

  vault:
    image: hashicorp/vault:1.15
    container_name: vault-server
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: |
        {
          "storage": {
            "file": {
              "path": "/vault/file"
            }
          },
          "listener": {
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": true
            }
          },
          "ui": true,
          "api_addr": "http://vault:8200"
        }
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - /home/southern-tech-workstation/vault-data:/vault/file
      - ./vault/config:/vault/config
    command: server

  # vault-seed is disabled in production mode.
  # After Vault is initialized and unsealed, run:
  #   ./vault/init-vault.sh
  # vault-seed:
  #   image: hashicorp/vault:1.15
  #   ...

  backend:
    build: ./backend
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_EXTERNAL_ENDPOINT=http://localhost:9000
      - MINIO_BUCKET=${MINIO_BUCKET}
      - VAULT_ENABLED=${VAULT_ENABLED}
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      vault:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8080
    container_name: frontend-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
