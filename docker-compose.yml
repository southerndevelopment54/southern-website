services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1Ll0calPost9res}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - /home/southern-tech-workstation/postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio-server
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /home/southern-tech-workstation/minio-data:/data

  vault:
    image: hashicorp/vault:1.15
    container_name: vault-server
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - /home/southern-tech-workstation/vault-data:/vault/file

  vault-seed:
    image: hashicorp/vault:1.15
    container_name: vault-seed
    depends_on:
      - vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    command: ["/bin/sh", "-c", "sleep 3 && vault kv put secret/security-co jwt.secret='xzzD1n3v1qO5nWZwXNrxfBl6DdE9o3zWtq3lL6dBmXTIOu+dz5c1BmW0+G0gMtFtaK+4bAxhJOu4C7+GbsfofA==' && echo 'Vault seeded successfully.'"]
    restart: "no"

  backend:
    build: ./backend
    container_name: backend-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_NAME=${DB_NAME:-postgres}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-1Ll0calPost9res}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_EXTERNAL_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=security-co
      - VAULT_ENABLED=true
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=dev-token
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      vault-seed:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        API_URL: http://backend:8080
    container_name: frontend-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
