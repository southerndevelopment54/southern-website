# =============================================================================
# Docker Compose Override — Local HTTPS Testing with Self-Signed SSL
# =============================================================================
# Use this file TOGETHER with docker-compose.yml to test the production
# nginx configuration locally without a real domain or Let's Encrypt.
#
# Prerequisites:
#   ./scripts/generate-local-ssl.sh   (run this first to create certificates)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local-ssl.yml up -d
#
# Access:
#   https://localhost
#   (Browser will show a security warning — accept it or trust the local CA)
#
# To stop:
#   docker compose -f docker-compose.yml -f docker-compose.local-ssl.yml down
# =============================================================================

services:
  nginx:
    volumes:
      # Override: use local self-signed certs instead of Let's Encrypt
      - ./nginx/ssl-local:/etc/nginx/ssl:ro
      # Override: use local SSL nginx config instead of production config
      - ./nginx/nginx.local-ssl.conf:/etc/nginx/conf.d/default.conf:ro
