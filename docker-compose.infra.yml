# =============================================================================
# INFRASTRUCTURE ONLY — FOR LOCAL DEVELOPMENT
# =============================================================================
# ⚠️ SECURITY WARNING: This file exposes postgres (5432), minio (9000/9001),
# and vault (8200) on 0.0.0.0. NEVER use this file on a public VPS.
#
# For VPS deployment, use docker-compose.yml (production-hardened).
#
# Run: docker compose -f docker-compose.infra.yml up -d
# Then start backend and frontend manually on your host machine.
# =============================================================================

services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - /home/southern-tech-workstation/postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio-server
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /home/southern-tech-workstation/minio-data:/data

  vault:
    image: hashicorp/vault:1.15
    container_name: vault-server
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    volumes:
      - /home/southern-tech-workstation/vault-data:/vault/file

  vault-seed:
    image: hashicorp/vault:1.15
    container_name: vault-seed
    depends_on:
      - vault
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
      JWT_SECRET: ${JWT_SECRET}
    command: ["/bin/sh", "-c", "sleep 3 && vault kv put secret/security-co jwt.secret=\"$JWT_SECRET\" && echo 'Vault seeded successfully.'"]
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.infra.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
