# =============================================================================
# INFRASTRUCTURE ONLY — FOR LOCAL DEVELOPMENT
# =============================================================================
# ⚠️ SECURITY WARNING: This file exposes postgres (5432) and minio (9000/9001)
# on 0.0.0.0. NEVER use this file on a public VPS.
#
# For VPS deployment, use docker-compose.yml (production-hardened).
#
# Run: docker compose -f docker-compose.infra.yml up -d
# Then start backend and frontend manually on your host machine.
# =============================================================================

services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - /home/southern-tech-workstation/postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio-server
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /home/southern-tech-workstation/minio-data:/data

  nginx:
    image: nginx:alpine
    container_name: nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.infra.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: []
