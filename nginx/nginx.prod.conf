# =============================================================================
# Production Nginx Configuration with Let's Encrypt SSL
# =============================================================================
# IMPORTANT: Replace 'southernservices.com.hk' with your actual domain before deploying.
# This config assumes certbot has already issued certificates to:
#   /etc/letsencrypt/live/southernservices.com.hk/
#
# On the VPS, update docker-compose.yml to mount this file instead of nginx.conf:
#   volumes:
#     - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
#     - /etc/letsencrypt:/etc/letsencrypt:ro
#     - /var/www/certbot:/var/www/certbot:ro
# =============================================================================

limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=submissions:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# HTTP: Certbot challenges + redirect everything else to HTTPS
server {
    listen 80;
    server_name southernservices.com.hk www.southernservices.com.hk;
    client_max_body_size 10M;

    # Certbot ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other HTTP traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: Main application
server {
    listen 443 ssl;
    server_name southernservices.com.hk www.southernservices.com.hk;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/southernservices.com.hk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/southernservices.com.hk/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    server_tokens off;

    # Hide Next.js internal headers
    proxy_hide_header x-powered-by;
    proxy_hide_header x-nextjs-prerender;
    proxy_hide_header x-nextjs-stale-time;
    proxy_hide_header x-nextjs-cache;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; frame-src 'self' https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Actuator: health public, everything else denied
    location /actuator/health {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
        deny all;
        return 404;
    }

    # Backend API with rate limiting
    location /api/contact {
        limit_req zone=contact burst=3 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/submissions {
        limit_req zone=submissions burst=5 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block hidden files and scanner probes
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(php|asp|aspx|jsp|cgi|pl|sql|mdb|ini|log|bak|old|pwd|config)$ {
        return 404;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
